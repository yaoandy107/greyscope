# Greyscope v2 ENCODER lite-tier arm (EN / ja / zh-TW): a modern multilingual encoder (mmBERT,
# ModernBERT arch), FULL fine-tune + CORN head — tests whether a ~300M encoder matches the 4B decoder
# (encoders are ONNX/MLX-clean for the browser tier). Same data/sampler/eval as train_v2; differs in
# backbone + raw-text input + full-FT LR. Run via `modal run modal/train.py::ablation_v2_encoder`.

model:
  name: jhu-clsp/mmBERT-base  # modern multilingual encoder (2025, ModernBERT arch, 307M, Gemma-2
                              # tokenizer, 8192 ctx, beats XLM-R on classification). Browser tier =
                              # jhu-clsp/mmBERT-small (140M), same family.
  arch: encoder               # encoder = plain transformers FULL fine-tune (no Unsloth/LoRA)
  max_seq_length: 2048        # matches the decoder — mmBERT does 8192, so NO 512-truncation
                              # confound (unlike XLM-R / mDeBERTa); apples-to-apples vs Qwen@2048
  dtype: bfloat16             # bf16 autocast (bf16=true); fp32 master weights for full-FT
  head: corn

data:
  source: v2
  splits_dir: data/v2/splits
  dataset: pangram/editlens_iclr    # unused for v2; schema parity
  n_buckets: 4
  bucket_lo_threshold: 0.03         # unused (v2 buckets precomputed)
  bucket_hi_threshold: 0.15
  min_words: 75                     # unused for v2 (CJK-safe loader)
  train_subset: null
  val_subset: null
  test_subset: null
  seed: 42
  apply_clean_text: true
  label_field: cosine_score
  sample_weight_temperature: 0.5    # τ smoothed inverse-freq sampler (shared with train_v2)
  use_prompt_template: false        # feed raw text: encoders classify from [CLS]; the decoder
                                    # instruction would just waste the 512-token budget

training:
  output_dir: outputs/greyscope-v2-encoder
  resume_from_checkpoint: true
  num_train_epochs: 3               # encoders need more passes than a LoRA decoder; early-stop caps it
  per_device_train_batch_size: 4    # mmBERT-base full-FT @2048 on L4 24GB — batch 16 OOMs (no
                                    # flash-attn unpadding → dense 16×2048); 4×accum-4 keeps eff. 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4    # effective batch 16 (matches the decoder ablation)
  learning_rate: 2.0e-5             # FULL-FT encoder LR — NOT the decoder's 2e-4 LoRA LR
  lr_scheduler_type: cosine
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  weight_decay: 0.01
  optim: adamw_8bit
  bf16: true
  fp16: false
  use_class_weights: false
  use_sample_weights: true          # joint language+bucket sampler (same as train_v2)
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_macro_f1
  greater_is_better: true
  early_stopping_patience: 5
  seed: 42
  logging_steps: 25
  report_to: wandb
