# zh-TW edit-prompt set (繁體中文．台灣). 9 categories × 9 prompts each = 81 entries.
# `split` keeps prompts disjoint across train/val/test (design §6/§14): n=1-7 train, n=8 val, n=9 test.

- id: zhtw-copyedit-1
  category: copyedit
  split: train
  prompt: "請只修正以下文字的錯字、標點與文法錯誤，其餘一律不要更動。"
- id: zhtw-copyedit-2
  category: copyedit
  split: train
  prompt: "以下這段文字交給你校稿，把錯別字和標點符號用法挑出來改正就好，用詞和語意都維持原樣。"
- id: zhtw-copyedit-3
  category: copyedit
  split: train
  prompt: "請以校對的角度檢查下面這段文字，只更正明顯的文法與標點錯誤，不要改寫句子。"
- id: zhtw-copyedit-4
  category: copyedit
  split: train
  prompt: "請逐句檢查以下文字，把錯字、漏字與多餘的標點修掉，務必保留原本的措辭與意思。"
- id: zhtw-copyedit-5
  category: copyedit
  split: train
  prompt: "下面這段文字可能有錯字或標點誤用，請只做這些字面上的修正，不要動到任何用詞。"
- id: zhtw-copyedit-6
  category: copyedit
  split: train
  prompt: "請當作最後一道校稿，僅修正以下文字的錯別字、標點與基本文法，內容與風格全部保持不變。"
- id: zhtw-copyedit-7
  category: copyedit
  split: train
  prompt: "請只把以下文字裡明顯寫錯的地方（錯字、標點、文法）改對，其他連一個詞都不要替換。"
- id: zhtw-copyedit-8
  category: copyedit
  split: val
  prompt: "請幫以下文字做最小幅度的訂正，只處理錯字與標點問題，語句結構維持原狀。"
- id: zhtw-copyedit-9
  category: copyedit
  split: test
  prompt: "以下文字請只挑出文法與標點上的錯誤加以修正，不增刪內容、不更換任何字詞。"

- id: zhtw-polish-1
  category: polish
  split: train
  prompt: "請輕度潤飾以下文字，讓行文更通順好讀，但盡量沿用原本的用字。"
- id: zhtw-polish-2
  category: polish
  split: train
  prompt: "以下這段文字讀起來有點卡，請稍微順一下語句，原則上保留原來的措辭與語氣。"
- id: zhtw-polish-3
  category: polish
  split: train
  prompt: "請幫下面這段文字做小幅潤稿，調整不順的地方就好，整體用詞維持原貌。"
- id: zhtw-polish-4
  category: polish
  split: train
  prompt: "請以編輯的角度稍微修飾以下文字，讓句子之間銜接得更自然，但不要大改用字。"
- id: zhtw-polish-5
  category: polish
  split: train
  prompt: "下面這段文字大致沒問題，請只把讀起來拗口的句子稍作修順，其餘照舊。"
- id: zhtw-polish-6
  category: polish
  split: train
  prompt: "請輕輕潤飾以下文字，重點放在讓段落更順暢，用詞與語意都儘量貼近原文。"
- id: zhtw-polish-7
  category: polish
  split: train
  prompt: "請幫以下文字做溫和的修飾，挑掉冗贅或不順的措辭，但不要改變原本的口吻。"
- id: zhtw-polish-8
  category: polish
  split: val
  prompt: "請小幅潤色下面這段文字，讓它更易讀，原本的用字遣詞能留就留。"
- id: zhtw-polish-9
  category: polish
  split: test
  prompt: "以下文字請以最輕的力道修順語句，只調整明顯不流暢處，內容一字不增不減。"

- id: zhtw-tone-1
  category: tone
  split: train
  prompt: "請在不改變事實的前提下，把以下文字改寫成更正式、更莊重的語氣。"
- id: zhtw-tone-2
  category: tone
  split: train
  prompt: "請把下面這段文字改得更輕鬆口語一點，像跟朋友聊天那樣，但內容意思不變。"
- id: zhtw-tone-3
  category: tone
  split: train
  prompt: "以下文字請調整成適合正式書信或公文的語氣，用詞更得體，事實維持原樣。"
- id: zhtw-tone-4
  category: tone
  split: train
  prompt: "請把以下文字的口吻改得更親切、更貼近一般讀者，去掉生硬的書面腔，但資訊不變。"
- id: zhtw-tone-5
  category: tone
  split: train
  prompt: "請以較為客氣、委婉的語氣重寫下面這段文字，內容與重點完全保留。"
- id: zhtw-tone-6
  category: tone
  split: train
  prompt: "請把以下文字改成更專業、更沉穩的語氣，適合放在正式場合，但不要更動任何事實。"
- id: zhtw-tone-7
  category: tone
  split: train
  prompt: "以下這段文字偏正式，請把它改得更口語、更隨興，讀起來更像日常說話，意思不變。"
- id: zhtw-tone-8
  category: tone
  split: val
  prompt: "請將下面這段文字的語氣調整為更熱情、更有活力的風格，但所述事實一律照舊。"
- id: zhtw-tone-9
  category: tone
  split: test
  prompt: "請把以下文字改寫成中性、客觀的正式語氣，去除情緒性字眼，內容保持不變。"

- id: zhtw-simplify-1
  category: simplify
  split: train
  prompt: "請把以下文字改寫成淺白易懂的中文，句子更短、用詞更簡單，語意完整保留。"
- id: zhtw-simplify-2
  category: simplify
  split: train
  prompt: "下面這段文字有點難懂，請用最白話的方式重講一遍，讓國中生也看得懂。"
- id: zhtw-simplify-3
  category: simplify
  split: train
  prompt: "請把以下文字裡艱澀的詞彙和長句拆解成簡單好讀的說法，意思不要跑掉。"
- id: zhtw-simplify-4
  category: simplify
  split: train
  prompt: "請以說明給一般大眾聽的角度，把下面這段文字改寫得更平易近人，避免專業術語。"
- id: zhtw-simplify-5
  category: simplify
  split: train
  prompt: "請把以下文字化繁為簡，用簡短的句子和日常用語表達同樣的內容。"
- id: zhtw-simplify-6
  category: simplify
  split: train
  prompt: "下面這段文字請改寫成更口語、更直白的版本，把複雜的概念講得簡單清楚，重點全部保留。"
- id: zhtw-simplify-7
  category: simplify
  split: train
  prompt: "請降低以下文字的閱讀難度，盡量縮短句子、替換難字，但不要遺漏原本的資訊。"
- id: zhtw-simplify-8
  category: simplify
  split: val
  prompt: "請把以下文字改寫得更好懂，用最簡單的方式說明，讓沒有背景知識的人也能理解。"
- id: zhtw-simplify-9
  category: simplify
  split: test
  prompt: "下面這段文字請用淺顯的白話重新表達，去掉繞口的長句，語意維持一致。"

- id: zhtw-paraphrase-1
  category: paraphrase
  split: train
  prompt: "請用你自己的話改寫以下文字，意思相同、長度也大致一樣。"
- id: zhtw-paraphrase-2
  category: paraphrase
  split: train
  prompt: "請把下面這段文字換句話說重寫一遍，不要照抄原句，但要表達同樣的內容。"
- id: zhtw-paraphrase-3
  category: paraphrase
  split: train
  prompt: "請以不同的措辭重新敘述以下文字，語意保持不變，篇幅維持相近。"
- id: zhtw-paraphrase-4
  category: paraphrase
  split: train
  prompt: "下面這段文字請換一種說法重寫，句型和用字盡量和原文不同，但意思要一致。"
- id: zhtw-paraphrase-5
  category: paraphrase
  split: train
  prompt: "請重新組織以下文字的字句，用全新的表達方式講出相同的意思，長度差不多。"
- id: zhtw-paraphrase-6
  category: paraphrase
  split: train
  prompt: "請把以下文字改寫成意思相同、但讀起來像另一個人寫的版本，長度維持原樣。"
- id: zhtw-paraphrase-7
  category: paraphrase
  split: train
  prompt: "請以換句話說的方式重寫下面這段文字，內容與重點不變，避免沿用原文的句子。"
- id: zhtw-paraphrase-8
  category: paraphrase
  split: val
  prompt: "請用不一樣的字詞與句構重述以下文字，傳達相同的訊息，篇幅大致相當。"
- id: zhtw-paraphrase-9
  category: paraphrase
  split: test
  prompt: "下面這段文字請改寫成語意等同的另一種說法，不增不減內容，長度保持接近。"

- id: zhtw-condense-1
  category: condense
  split: train
  prompt: "請精簡以下文字，刪去冗詞贅句，但每一個重點都要保留。"
- id: zhtw-condense-2
  category: condense
  split: train
  prompt: "請把下面這段文字濃縮得更精煉，去掉重複與多餘的話，核心資訊不要漏掉。"
- id: zhtw-condense-3
  category: condense
  split: train
  prompt: "以下文字請刪減到只剩重點，把可有可無的修飾與廢話拿掉。"
- id: zhtw-condense-4
  category: condense
  split: train
  prompt: "請以編輯的角度大幅刪修下面這段文字，砍掉冗長的部分，留下最關鍵的內容。"
- id: zhtw-condense-5
  category: condense
  split: train
  prompt: "請把以下文字壓縮成更短的版本，剔除重複論點與贅字，意思完整保留。"
- id: zhtw-condense-6
  category: condense
  split: train
  prompt: "請將下面這段文字精簡約三成，刪去枝節與重複，但所有重點都要在。"
- id: zhtw-condense-7
  category: condense
  split: train
  prompt: "以下文字請去蕪存菁，把不影響理解的細節與冗句拿掉，整體更為精簡。"
- id: zhtw-condense-8
  category: condense
  split: val
  prompt: "請把以下文字縮短到一半左右，只保留最重要的訊息，其餘冗贅刪除。"
- id: zhtw-condense-9
  category: condense
  split: test
  prompt: "下面這段文字請大刀闊斧地刪減冗詞與重複內容，讓它更緊湊，重點不變。"

- id: zhtw-expand-1
  category: expand
  split: train
  prompt: "請在保留原本內容的前提下，為以下文字補充細節與說明，使其更為豐富。"
- id: zhtw-expand-2
  category: expand
  split: train
  prompt: "請把下面這段文字加以擴充，多舉幾個例子並解釋得更清楚，原有內容全部保留。"
- id: zhtw-expand-3
  category: expand
  split: train
  prompt: "以下文字請補上背景說明與具體例證，讓論述更完整，不要刪去任何既有內容。"
- id: zhtw-expand-4
  category: expand
  split: train
  prompt: "請以充實內容為目標，為下面這段文字增添細節、數據或情境描述，原文照舊保留。"
- id: zhtw-expand-5
  category: expand
  split: train
  prompt: "請把以下文字延伸寫得更詳盡，針對每個重點補充進一步的解釋與例子。"
- id: zhtw-expand-6
  category: expand
  split: train
  prompt: "請為下面這段文字加入更多說明與舉例，把篇幅大致擴充一倍，原有內容不變。"
- id: zhtw-expand-7
  category: expand
  split: train
  prompt: "以下文字請逐段補充細節，讓讀者更容易理解，既有的論點與資訊全部保留。"
- id: zhtw-expand-8
  category: expand
  split: val
  prompt: "請把以下文字擴寫得更豐富，補上相關脈絡與實例，但不要更動原本的主張。"
- id: zhtw-expand-9
  category: expand
  split: test
  prompt: "下面這段文字請加以鋪陳延伸，為每個概念多加一些說明與例證，原文內容維持完整。"

- id: zhtw-restructure-1
  category: restructure
  split: train
  prompt: "請重新組織以下文字，使邏輯更流暢，可自由合併或拆分句子與段落。"
- id: zhtw-restructure-2
  category: restructure
  split: train
  prompt: "請重新安排下面這段文字的論述順序，把相關的內容歸在一起，重點不變。"
- id: zhtw-restructure-3
  category: restructure
  split: train
  prompt: "以下文字請把過長的段落拆開、零碎的句子合併，讓整體結構更清楚。"
- id: zhtw-restructure-4
  category: restructure
  split: train
  prompt: "請以編輯的角度重整下面這段文字的架構，調整段落先後並重新分段，內容資訊保留。"
- id: zhtw-restructure-5
  category: restructure
  split: train
  prompt: "請把以下文字依重要性重新排序，先講重點再講細節，可重新切分段落。"
- id: zhtw-restructure-6
  category: restructure
  split: train
  prompt: "請重組下面這段文字的結構，將分散的相關論點整併成連貫的段落，事實維持不變。"
- id: zhtw-restructure-7
  category: restructure
  split: train
  prompt: "以下文字請調換段落順序、合併重複的主題，使前後邏輯銜接更順，內容照舊。"
- id: zhtw-restructure-8
  category: restructure
  split: val
  prompt: "請把以下文字重新分段並調整鋪陳順序，讓論述由淺入深，重點全部保留。"
- id: zhtw-restructure-9
  category: restructure
  split: test
  prompt: "下面這段文字請大幅重整結構，拆併句子與段落、重排順序，但所述內容不變。"

- id: zhtw-rewrite-1
  category: rewrite
  split: train
  prompt: "請大幅改寫以下文字的文體與口吻，但保留原本的主題與重點。"
- id: zhtw-rewrite-2
  category: rewrite
  split: train
  prompt: "請把下面這段文字徹底重寫成另一種風格，換個寫法呈現，核心訊息維持不變。"
- id: zhtw-rewrite-3
  category: rewrite
  split: train
  prompt: "以下文字請以全新的筆觸重新創作，可大改句構與語氣，只要主旨與重點保留即可。"
- id: zhtw-rewrite-4
  category: rewrite
  split: train
  prompt: "請以記者報導的口吻重寫下面這段文字，整體文風大改，但傳達的事實與重點不變。"
- id: zhtw-rewrite-5
  category: rewrite
  split: train
  prompt: "請把以下文字改寫成完全不同的文章風格，從用字到語感都重新打造，主題照舊。"
- id: zhtw-rewrite-6
  category: rewrite
  split: train
  prompt: "請以說故事的方式大幅重寫下面這段文字，文體口吻全面更換，重點訊息保留。"
- id: zhtw-rewrite-7
  category: rewrite
  split: train
  prompt: "以下文字請整篇重寫成更生動、更有個人風格的版本，內容主旨維持一致。"
- id: zhtw-rewrite-8
  category: rewrite
  split: val
  prompt: "請把以下文字大刀闊斧地重寫，改變文體、結構與語氣，但保留原本要表達的核心。"
- id: zhtw-rewrite-9
  category: rewrite
  split: test
  prompt: "下面這段文字請以截然不同的口吻與寫法重新撰寫一篇，主題與重點不變。"

# --- Casual user-voice expansion (繁中台灣口語) --------------------------------
# How Taiwanese users actually type to ChatGPT: 幫我、可以…嗎、一下、light context
# mentions (報告/信/貼文). Each stays within its category's edit scope. IDs continue
# 10-18 per existing category (10-16 train, 17 val, 18 test); new `improve` category 1-9.

- id: zhtw-copyedit-10
  category: copyedit
  split: train
  prompt: "錯字幫我抓一下就好，其他不要動喔。"
- id: zhtw-copyedit-11
  category: copyedit
  split: train
  prompt: "這封信我怕有錯字跟標點的問題，可以幫我檢查一下嗎？只改錯的地方就好。"
- id: zhtw-copyedit-12
  category: copyedit
  split: train
  prompt: "幫我看看下面有沒有打錯字或標點用錯，有的話直接改掉，內容不用改。"
- id: zhtw-copyedit-13
  category: copyedit
  split: train
  prompt: "這段貼文標點好像怪怪的，幫我修一下，字句照原本的就好。"
- id: zhtw-copyedit-14
  category: copyedit
  split: train
  prompt: "麻煩幫我把明顯的錯別字跟文法錯誤挑出來改對，其他保持原樣～"
- id: zhtw-copyedit-15
  category: copyedit
  split: train
  prompt: "這份報告只要幫我校錯字就好，不要幫我改寫喔。"
- id: zhtw-copyedit-16
  category: copyedit
  split: train
  prompt: "幫我掃一下有沒有漏字或多打的字，順便標點對一下，用詞不要換。"
- id: zhtw-copyedit-17
  category: copyedit
  split: val
  prompt: "可以幫我把這段的錯字跟標點抓一抓嗎？其他都不用改。"
- id: zhtw-copyedit-18
  category: copyedit
  split: test
  prompt: "下面這段幫我單純挑錯字跟文法就好，一個詞都不要替換。"

- id: zhtw-polish-10
  category: polish
  split: train
  prompt: "幫我把這段改順一點，讀起來卡卡的。"
- id: zhtw-polish-11
  category: polish
  split: train
  prompt: "這篇報告可以幫我潤一下嗎？用字盡量保留，就順一順就好。"
- id: zhtw-polish-12
  category: polish
  split: train
  prompt: "這段唸起來有點怪，幫我稍微修一下讓它順，不用大改。"
- id: zhtw-polish-13
  category: polish
  split: train
  prompt: "幫我把這封信潤得順一點點，原本的語氣留著喔。"
- id: zhtw-polish-14
  category: polish
  split: train
  prompt: "可以幫我輕輕潤一下這段嗎？只要把不順的地方修掉就好。"
- id: zhtw-polish-15
  category: polish
  split: train
  prompt: "這段大致OK，麻煩幫我把幾句拗口的地方順過去，其他別動。"
- id: zhtw-polish-16
  category: polish
  split: train
  prompt: "幫我小小潤稿一下這篇貼文，讀起來流暢就好，用詞盡量沿用。"
- id: zhtw-polish-17
  category: polish
  split: val
  prompt: "這段可以幫我修得順一點嗎？意思不要跑掉。"
- id: zhtw-polish-18
  category: polish
  split: test
  prompt: "幫我把下面這段用最輕的力道順一下，內容一字不要增減。"

- id: zhtw-tone-10
  category: tone
  split: train
  prompt: "幫我把這段改得正式一點，要寄給主管的。"
- id: zhtw-tone-11
  category: tone
