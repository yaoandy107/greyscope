# ja edit-prompt set — 9 categories (copyedit, polish, tone, simplify, paraphrase, condense, expand, restructure, rewrite) × 9 prompts each = 81.
# `split` keeps prompts disjoint across train/val/test (n=1-7 train, n=8 val, n=9 test); see design §6/§14.

# --- copyedit -------------------------------------------------------------
- id: ja-copyedit-1
  category: copyedit
  split: train
  prompt: "以下の文章の誤字脱字・句読点・文法の誤りだけを直し、それ以外は一切変えないでください。"
- id: ja-copyedit-2
  category: copyedit
  split: train
  prompt: "以下の文章を校正し、明らかな変換ミスやタイプミスを修正してください。語彙や言い回しはそのまま残してください。"
- id: ja-copyedit-3
  category: copyedit
  split: train
  prompt: "校正者になったつもりで、以下の文章の助詞の誤り・送り仮名・てにをはの間違いだけを正してください。"
- id: ja-copyedit-4
  category: copyedit
  split: train
  prompt: "以下の文章の句読点の打ち方と全角・半角の表記ゆれだけを整えてください。文の内容は変えないでください。"
- id: ja-copyedit-5
  category: copyedit
  split: train
  prompt: "以下の文の文法的に正しくない箇所を最小限の修正で直してください。意味や言い回しは変更しないでください。"
- id: ja-copyedit-6
  category: copyedit
  split: train
  prompt: "以下の文章を一字一句チェックし、誤変換・脱字・余分な空白を取り除いてください。それ以外には手を加えないでください。"
- id: ja-copyedit-7
  category: copyedit
  split: train
  prompt: "以下の文章にある主語と述語のねじれや、活用の誤りだけを正してください。表現自体は元のままにしてください。"
- id: ja-copyedit-8
  category: copyedit
  split: val
  prompt: "編集者として、以下の文章の明白な誤記と句読点の誤用のみを修正し、文体や語彙には触れないでください。"
- id: ja-copyedit-9
  category: copyedit
  split: test
  prompt: "以下の文章の漢字の使い分けの誤りと送り仮名の不統一だけを直してください。それ以外は原文を保ってください。"

# --- polish ---------------------------------------------------------------
- id: ja-polish-1
  category: polish
  split: train
  prompt: "以下の文章を、語彙や意味はそのままに、読みやすさと流れを少しだけ整えてください。"
- id: ja-polish-2
  category: polish
  split: train
  prompt: "以下の文章のぎこちない言い回しだけを軽くなめらかにしてください。内容や情報量は変えないでください。"
- id: ja-polish-3
  category: polish
  split: train
  prompt: "以下の文章の文と文のつながりを自然にし、重複した表現を控えめに整えてください。大きくは書き換えないでください。"
- id: ja-polish-4
  category: polish
  split: train
  prompt: "編集者として、以下の文章にさっと目を通し、引っかかる部分だけを最小限に手直しして読みやすくしてください。"
- id: ja-polish-5
  category: polish
  split: train
  prompt: "以下の文章のリズムを整え、不自然に長い一文があれば軽く調整してください。語り口や語彙はほぼそのままにしてください。"
- id: ja-polish-6
  category: polish
  split: train
  prompt: "以下の文章を、意味を変えずに、より洗練された自然な日本語になるよう控えめに磨いてください。"
- id: ja-polish-7
  category: polish
  split: train
  prompt: "以下の文章のたどたどしい接続や語順だけをそっと直し、もとの雰囲気は残してください。"
- id: ja-polish-8
  category: polish
  split: val
  prompt: "以下の文章の読み心地を良くするため、表現を大きく変えない範囲で言葉の選び方をわずかに整えてください。"
- id: ja-polish-9
  category: polish
  split: test
  prompt: "以下の文章を一段だけ丁寧に推敲し、ひっかかりのある箇所をなめらかにしてください。情報は一切足さないでください。"

# --- tone -----------------------------------------------------------------
- id: ja-tone-1
  category: tone
  split: train
  prompt: "以下の文章を、事実を変えずに、より丁寧でフォーマルなビジネス文書の文体に書き換えてください。"
- id: ja-tone-2
  category: tone
  split: train
  prompt: "以下の文章を、内容はそのままに、友人に話しかけるようなくだけた口語調にしてください。"
- id: ja-tone-3
  category: tone
  split: train
  prompt: "以下の文章を常体（だ・である調）から敬体（です・ます調）に統一して書き換えてください。事実は変えないでください。"
- id: ja-tone-4
  category: tone
  split: train
  prompt: "以下の文章を、敬体から常体に直し、論文のような硬い文体に整えてください。中身は変えないでください。"
- id: ja-tone-5
  category: tone
  split: train
  prompt: "編集者として、以下の文章を温かく親しみやすいトーンに調整してください。情報の正確さは保ってください。"
- id: ja-tone-6
  category: tone
  split: train
  prompt: "以下の文章を、社外向けの礼儀正しく改まった敬語表現に整え直してください。意味は変えないでください。"
- id: ja-tone-7
  category: tone
  split: train
  prompt: "以下の文章を、感情を抑えた中立的で客観的な報告調に書き換えてください。事実関係は一切変えないでください。"
- id: ja-tone-8
  category: tone
  split: val
  prompt: "以下の文章を、SNSの投稿のように軽快でくだけた語り口に変えてください。内容そのものは保ってください。"
- id: ja-tone-9
  category: tone
  split: test
  prompt: "広報担当者になったつもりで、以下の文章を熱意のこもった前向きなトーンに書き換えてください。事実は変えないでください。"

# --- simplify -------------------------------------------------------------
- id: ja-simplify-1
  category: simplify
  split: train
  prompt: "以下の文章を、意味を保ったまま、短い文とやさしい言葉でわかりやすく書き直してください。"
- id: ja-simplify-2
  category: simplify
  split: train
  prompt: "以下の文章の難しい漢語や専門用語を、日常的でかみくだいた表現に置き換えてください。内容は変えないでください。"
- id: ja-simplify-3
  category: simplify
  split: train
  prompt: "以下の文章を、小学校高学年でも読めるくらいやさしい日本語に直してください。要点はすべて残してください。"
- id: ja-simplify-4
  category: simplify
  split: train
  prompt: "以下の長い一文を、意味を変えずにいくつかの短くて明快な文に分けてください。"
- id: ja-simplify-5
  category: simplify
  split: train
  prompt: "編集者として、以下の文章の回りくどい言い回しをほどき、まっすぐで平易な表現にしてください。意味は保ってください。"
- id: ja-simplify-6
  category: simplify
  split: train
  prompt: "以下の文章を、初めてこの話題に触れる人にもわかるよう、やさしく噛み砕いて言い直してください。"
- id: ja-simplify-7
  category: simplify
  split: train
  prompt: "以下の文章から堅苦しさを取り除き、誰でもすっと理解できる平易な日本語にしてください。情報は減らさないでください。"
- id: ja-simplify-8
  category: simplify
  split: val
  prompt: "以下の文章を、専門用語はそのまま残しつつ、その周りの説明だけをやさしく言い換えてわかりやすくしてください。"
- id: ja-simplify-9
  category: simplify
  split: test
  prompt: "以下の文章を、複雑な構文を避けてできるだけシンプルな文構造に直してください。意味は変えないでください。"

# --- paraphrase -----------------------------------------------------------
- id: ja-paraphrase-1
  category: paraphrase
  split: train
  prompt: "以下の文章を、意味も長さもほぼ保ったまま、別の言葉で言い換えてください。"
- id: ja-paraphrase-2
  category: paraphrase
  split: train
  prompt: "以下の文章を、同じ内容のまま、語彙と言い回しを入れ替えて書き直してください。長さは変えないでください。"
- id: ja-paraphrase-3
  category: paraphrase
  split: train
  prompt: "以下の文章を、一文ずつ別の表現に置き換えてください。情報の中身と分量は元のままにしてください。"
- id: ja-paraphrase-4
  category: paraphrase
  split: train
  prompt: "以下の文章を、原文と重ならない語句を使って言い換えてください。意味も長さもほぼ同じに保ってください。"
- id: ja-paraphrase-5
  category: paraphrase
  split: train
  prompt: "編集者として、以下の文章を自分の言葉で言い直してください。事実・主張・分量はそのまま維持してください。"
- id: ja-paraphrase-6
  category: paraphrase
  split: train
  prompt: "以下の文章を、固有名詞や数字はそのままに、それ以外の表現を言い換えてください。長さはほぼ同じにしてください。"
- id: ja-paraphrase-7
  category: paraphrase
  split: train
  prompt: "以下の文章を、文の順序は保ったまま、各文を別の言い回しに書き換えてください。意味は変えないでください。"
- id: ja-paraphrase-8
  category: paraphrase
  split: val
  prompt: "以下の文章を、語り口や一人称は変えずに、語彙だけを入れ替えて言い換えてください。長さもほぼ同じに保ってください。"
- id: ja-paraphrase-9
  category: paraphrase
  split: test
  prompt: "以下の文章を、できる限り原文と異なる言葉づかいで言い換えつつ、内容と長さを一致させてください。"

# --- condense -------------------------------------------------------------
- id: ja-condense-1
  category: condense
  split: train
  prompt: "以下の文章を、要点をすべて残したまま、冗長な部分を削って引き締めてください。"
- id: ja-condense-2
  category: condense
  split: train
  prompt: "以下の文章を、重複や言い回しの無駄を取り除いて、半分程度の長さに短くしてください。要点は落とさないでください。"
- id: ja-condense-3
  category: condense
  split: train
  prompt: "以下の文章から、繰り返しと回りくどい表現を削り、簡潔に言い切ってください。情報は欠かさないでください。"
- id: ja-condense-4
  category: condense
  split: train
  prompt: "編集者として、以下の文章を引き締め、不要な修飾語や前置きを削ってください。中身の要点は保ってください。"
- id: ja-condense-5
  category: condense
  split: train
  prompt: "以下の文章を、各文をできるだけ短くして全体をコンパクトにまとめてください。重要な情報はすべて残してください。"
- id: ja-condense-6
  category: condense
  split: train
  prompt: "以下の文章を3割ほど短くしてください。なくても意味が通る言葉から削り、要点はそのまま保ってください。"
- id: ja-condense-7
  category: condense
  split: train
  prompt: "以下の文章を、内容を一つも落とさずに、できる限り少ない語数で言い直してください。"
- id: ja-condense-8
  category: condense
  split: val
  prompt: "以下の文章を、専門用語や固有名詞は残しつつ、説明の冗長な部分だけを削って短くしてください。"
- id: ja-condense-9
  category: condense
  split: test
  prompt: "以下の文章の本筋に関係のない補足や言い訳めいた一文を削り、芯だけを残してすっきりさせてください。"

# --- expand ---------------------------------------------------------------
- id: ja-expand-1
  category: expand
  split: train
  prompt: "以下の文章の内容を保ったまま、説明や詳細を加えて膨らませてください。"
- id: ja-expand-2
  category: expand
  split: train
  prompt: "以下の文章に具体例を一つ二つ補い、各論点をより丁寧に説明してください。元の主張は変えないでください。"
- id: ja-expand-3
  category: expand
  split: train
  prompt: "以下の文章を、背景や理由を補足して2倍程度の分量に膨らませてください。元の内容と矛盾しないようにしてください。"
- id: ja-expand-4
  category: expand
  split: train
  prompt: "編集者として、以下の文章の説明が足りない箇所に補足を加え、読み手が理解しやすいよう肉付けしてください。"
- id: ja-expand-5
  category: expand
  split: train
  prompt: "以下の各文に、それを裏づける詳しい描写や具体的な情報を付け足してください。もとの趣旨は保ってください。"
- id: ja-expand-6
  category: expand
  split: train
  prompt: "以下の文章を、移行の文や言い換えを足してより読みやすく展開してください。新しい事実は加えないでください。"
- id: ja-expand-7
  category: expand
  split: train
  prompt: "以下の文章の要点ごとに、その意味や影響を一文ずつ補って詳しくしてください。元の論旨は変えないでください。"
- id: ja-expand-8
  category: expand
  split: val
  prompt: "以下の文章を、一人称や語り口はそのままに、情景や感情の描写を加えてふくらませてください。"
- id: ja-expand-9
  category: expand
  split: test
  prompt: "以下の文章に、想定される疑問への答えや補足説明を織り込んで、より丁寧で詳しい文章にしてください。"

# --- restructure ----------------------------------------------------------
- id: ja-restructure-1
  category: restructure
  split: train
  prompt: "以下の文章を、論理の流れがよくなるように再構成してください。文や段落の統合・分割は自由です。"
- id: ja-restructure-2
  category: restructure
  split: train
  prompt: "以下の文章の段落の順序を組み替え、結論を先に示してから理由を続ける構成にしてください。内容は変えないでください。"
- id: ja-restructure-3
  category: restructure
  split: train
  prompt: "以下の文章の細切れの短文を意味のまとまりごとに結合し、読みやすい段落に整理してください。情報は保ってください。"
- id: ja-restructure-4
  category: restructure
  split: train
  prompt: "以下の長い段落を、話題ごとに複数の段落に分割してください。文言はできるだけそのまま、順序だけを整えてください。"
- id: ja-restructure-5
  category: restructure
  split: train
  prompt: "編集者として、以下の文章を時系列に沿った順序に並べ替えてください。事実は変えず、つなぎだけ補ってください。"
- id: ja-restructure-6
  category: restructure
  split: train
  prompt: "以下の文章の要点を整理し、関連する内容をまとめて、全体の構成を立て直してください。意味は保ってください。"
- id: ja-restructure-7
  category: restructure
  split: train
  prompt: "以下の文章を、導入・本論・まとめの流れになるよう組み替えてください。情報の取捨はせず、順序だけを変えてください。"
- id: ja-restructure-8
  category: restructure
  split: val
  prompt: "以下の文章の中で最も重要な主張を冒頭に持ってきて、残りをそれを支える形に並べ替えてください。内容は変えないでください。"
- id: ja-restructure-9
  category: restructure
  split: test
  prompt: "以下の文章を、箇条書きにできる部分はまとめ、ばらけた説明を一つの段落に統合して構成し直してください。"

# --- rewrite --------------------------------------------------------------
- id: ja-rewrite-1
  category: rewrite
  split: train
  prompt: "以下の文章を、話題と要点は保ちつつ、文体と語り口を大きく変えて一から書き直してください。"
- id: ja-rewrite-2
  category: rewrite
  split: train
  prompt: "以下の文章を、エッセイのような個人的で語りかける文章として書き直してください。伝える内容は変えないでください。"
- id: ja-rewrite-3
  category: rewrite
  split: train
  prompt: "以下の文章を、報道記事のような簡潔で客観的な文体に全面的に書き換えてください。要点はすべて含めてください。"
- id: ja-rewrite-4
  category: rewrite
  split: train
  prompt: "ライターとして、以下の文章をまったく別の声で書き直してください。事実と論旨は保ちつつ、表現は自由に変えてください。"
- id: ja-rewrite-5
  category: rewrite
  split: train
  prompt: "以下の文章を、語りかけるブログ記事のような親しみやすい文章に作り変えてください。中身は変えないでください。"
- id: ja-rewrite-6
  category: rewrite
  split: train
  prompt: "以下の文章を、物語のように情景の浮かぶ描写的な文章へと大胆に書き直してください。扱う事柄は保ってください。"
- id: ja-rewrite-7
  category: rewrite
  split: train
  prompt: "以下の文章を、説得力のある主張文として一から構成し直してください。論点は同じまま、文体は刷新してください。"
- id: ja-rewrite-8
  category: rewrite
  split: val
  prompt: "以下の文章を、講演の台本のように聴き手に語りかける口調へ全面的に書き換えてください。要点は変えないでください。"
- id: ja-rewrite-9
  category: rewrite
  split: test
  prompt: "以下の文章を、別の書き手が同じ題材を扱ったかのように、声も構成も大きく変えて書き直してください。話題と要点は保ってください。"

# Casual user-voice expansion — how people actually type edit requests to a chatbot (plain/casual
# forms, question phrasings, light context like メール/レポート/ブログ), each within its category's
# scope. Per category 10–16 train, 17 val, 18 test; new `improve` category 1–7 train, 8 val, 9 test.
# --- copyedit (casual) ----------------------------------------------------
- id: ja-copyedit-10
  category: copyedit
  split: train
  prompt: "誤字ってたら直して。それ以外はいじらないでね。"
- id: ja-copyedit-11
  category: copyedit
  split: train
  prompt: "このメール送る前に、タイプミスと変換ミスだけチェックしてもらえる？"
- id: ja-copyedit-12
  category: copyedit
  split: train
  prompt: "てにをはが変なとこだけ直してほしい。言い回しはそのままで。"
- id: ja-copyedit-13
  category: copyedit
  split: train
  prompt: "句読点の付け方おかしいとこある？あったら直しといて。中身は変えなくていいよ。"
- id: ja-copyedit-14
  category: copyedit
  split: train
  prompt: "誤字脱字だけ拾ってくれる？内容は触らないでそのまま。"
- id: ja-copyedit-15
  category: copyedit
  split: train
  prompt: "送り仮名バラバラかもだから、そこだけ揃えて。あとは何もしないで。"
- id: ja-copyedit-16
  category: copyedit
  split: train
  prompt: "文法ミスだけこっそり直してくれると助かる。言葉遣いは変えないでね。"
- id: ja-copyedit-17
  category: copyedit
  split: val
  prompt: "全角半角ぐちゃぐちゃになってるとこだけ整えてもらえますか？意味は変えないで。"
- id: ja-copyedit-18
  category: copyedit
  split: test
  prompt: "漢字の変換ミスだけ直して。それ以外は一文字も変えないでほしい。"

# --- polish (casual) ------------------------------------------------------
- id: ja-polish-10
  category: polish
  split: train
  prompt: "この文章、もっといい感じにして。意味は変えなくていいから読みやすくだけ。"
- id: ja-polish-11
  category: polish
  split: train
  prompt: "なんか読みにくいとこだけちょっと直してくれる？大きくは書き換えないで。"
- id: ja-polish-12
  category: polish
  split: train
  prompt: "文のつながりがぎこちないところだけ軽く整えてほしいな。内容はそのまま。"
- id: ja-polish-13
  category: polish
  split: train
  prompt: "このブログ、言葉のダブりが気になるから軽く磨いといて。情報は足さないで。"
- id: ja-polish-14
  category: polish
  split: train
  prompt: "ざっと読んで引っかかるとこだけ手直ししてもらえる？雰囲気は残してね。"
- id: ja-polish-15
  category: polish
  split: train
  prompt: "全体的にちょっとだけなめらかにして。語彙とかはほぼそのままでいいよ。"
- id: ja-polish-16
  category: polish
  split: train
  prompt: "一文長すぎて読みづらいとこあったら軽く整えて。話の中身はいじらないで。"
- id: ja-polish-17
